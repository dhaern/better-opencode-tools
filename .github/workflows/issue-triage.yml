name: Issue triage

on:
  issues:
    types:
      - opened
      - edited

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Triage issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = (issue.body || '').replace(/\r/g, '');
            const marker = '<!-- better-opencode-tools-issue-triage -->';
            const pluginMap = {
              'opencode-betterglob': 'plugin:betterglob',
              'opencode-bettergrep': 'plugin:bettergrep',
              'opencode-betterread': 'plugin:betterread',
            };

            const existingLabels = new Set(
              (issue.labels || [])
                .map((label) => (typeof label === 'string' ? label : label.name))
                .filter(Boolean),
            );

            function hasHeading(label) {
              const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              return new RegExp(`(?:^|\\n)###\\s+${escaped}\\s*(?:\\n|$)`, 'i').test(body);
            }

            function getSection(label) {
              const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const match = body.match(
                new RegExp(`(?:^|\\n)###\\s+${escaped}\\s*\\n+([\\s\\S]*?)(?=\\n###\\s+|$)`, 'i'),
              );

              return match ? match[1].trim() : '';
            }

            function firstMeaningfulLine(value) {
              return (value || '')
                .split('\n')
                .map((line) => line.trim())
                .find(Boolean) || '';
            }

            function isMeaningful(value) {
              const trimmed = (value || '').trim();
              if (!trimmed) {
                return false;
              }

              const plain = trimmed
                .replace(/[`*_>#-]/g, '')
                .trim()
                .toLowerCase();

              if (!plain || ['no response', 'n/a', 'na', 'none', 'unknown', '?', 'todo', 'tbd'].includes(plain)) {
                return false;
              }

              return plain.replace(/[^a-z0-9]+/g, '').length >= 3;
            }

            const sections = {
              plugin: firstMeaningfulLine(getSection('Plugin')).toLowerCase(),
              description: getSection('Description'),
              expectedBehavior: getSection('Expected behavior'),
              whyThisWouldHelp: getSection('Why this would help'),
              question: getSection('Question'),
            };

            const pluginLabel = pluginMap[sections.plugin] || null;

            const issueType = existingLabels.has('bug')
              ? 'bug'
              : existingLabels.has('enhancement')
                ? 'enhancement'
                : existingLabels.has('question')
                  ? 'question'
                  : hasHeading('Expected behavior')
                    ? 'bug'
                    : hasHeading('Why this would help')
                      ? 'enhancement'
                      : hasHeading('Question')
                        ? 'question'
                        : null;

            const requiredFieldsByType = {
              bug: [
                ['Plugin', pluginLabel],
                ['Description', sections.description],
                ['Expected behavior', sections.expectedBehavior],
              ],
              enhancement: [
                ['Plugin', pluginLabel],
                ['Description', sections.description],
                ['Why this would help', sections.whyThisWouldHelp],
              ],
              question: [
                ['Plugin', pluginLabel],
                ['Question', sections.question],
              ],
            };

            const missingFields = (requiredFieldsByType[issueType] || [])
              .filter(([, value]) => !isMeaningful(String(value || '')))
              .map(([label]) => label);

            const labelsToAdd = [];

            if (pluginLabel && !existingLabels.has(pluginLabel)) {
              labelsToAdd.push(pluginLabel);
            }

            if (missingFields.length > 0 && !existingLabels.has('needs-info')) {
              labelsToAdd.push('needs-info');
            }

            const labelsAdded = [];

            for (const label of labelsToAdd) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [label],
                });
                labelsAdded.push(label);
              } catch (error) {
                core.warning(`Could not add label "${label}": ${error.message}`);
              }
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100,
            });

            const alreadyCommented = comments.some((comment) =>
              (comment.body || '').includes(marker),
            );

            if (alreadyCommented) {
              return;
            }

            let message = null;

            if (missingFields.length > 0) {
              message = `${marker}\nThanks — I need a bit more information to finish triage. Please fill in: ${missingFields.join(', ')}.`;
            } else if (issueType === 'bug') {
              const added = labelsAdded.length > 0 ? labelsAdded.join(', ') : 'none';
              message = `${marker}\nThanks — issue triaged. Labels added: ${added}. If you can share a small repro snippet or exact tool call, that will help narrow it down faster.`;
            } else if (issueType === 'enhancement') {
              const added = labelsAdded.length > 0 ? labelsAdded.join(', ') : 'none';
              message = `${marker}\nThanks — feature request triaged. Labels added: ${added}.`;
            } else if (issueType === 'question') {
              const added = labelsAdded.length > 0 ? labelsAdded.join(', ') : 'none';
              message = `${marker}\nThanks — question triaged. Labels added: ${added}.`;
            }

            if (!message) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: message,
            });
